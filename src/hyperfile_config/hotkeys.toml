# =============================================================================
# Hyperfile hotkeys (metadata-driven)
#
# This file is the source of truth for BOTH:
# 1) key bindings used by the app
# 2) help menu content shown via "?"
#
# Each hotkey entry uses 4 properties in this order:
#   ["<hotkey>", "<pretty name>", "<description>", "<icon>"]
#
# Name limit:
# - "<pretty name>" should be at most 16 characters.
# - Longer names are truncated to 16 characters when loaded.
#
# Grouping strategy:
# - [headers] maps section keys to display titles in the help menu.
# - Context sections (e.g. [ui], [navigation], [file_operations]) are workflow-oriented.
# - Keep growing context groups by user workflow state:
#   * when selection is active (multi-select workflows)
#   * when focus is in a specific panel (sidebar / metadata / process)
#   * when typing/search mode is active
#
# Expansion idea:
# - Add context-only entries for discoverability even if key is shared.
# - Keep IDs stable (left side names) because code loads by these IDs.
#
# NOTE:
# Some keys are also treated specially by runtime behavior, but still documented here
# so help remains complete and consistent.
# =============================================================================

[headers]
