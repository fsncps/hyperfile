# =============================================================================
# Hyperfile hotkeys
#
# Design rules:
#   • ctrl+key  = file operations (act on files)
#   • alt+key   = app / UI operations (navigate the app itself)
#   • arrow / special keys = navigation (no modifier needed)
#   • ALL bare letters, digits, and filename characters [A-Za-z0-9@_.+=/-]
#     are reserved for the always-on filter input — every hotkey must carry
#     a modifier.
#
# Hard-coded in source (values here are ignored):
#   enter        → confirm / open item
#   esc          → cancel / close modal
#   ?            → open help
#   :            → open shell command prompt
#   >            → open hyperfile command prompt
#   shift+up     → extend selection up
#   shift+down   → extend selection down
#   mouse wheel  → scroll
# =============================================================================

# ─────────────────────────────────────────────────────────────────────────────
# Navigation  (arrow and special keys — no modifier needed)
# ─────────────────────────────────────────────────────────────────────────────
list_up             = ['up']
list_down           = ['down']
page_up             = ['pgup']
page_down           = ['pgdown']
parent_directory    = ['left']
confirm             = ['right']
next_file_panel     = ['tab']
previous_file_panel = ['shift+tab']

# ─────────────────────────────────────────────────────────────────────────────
# File operations  ctrl+  (act on files in the panel)
# ─────────────────────────────────────────────────────────────────────────────
file_panel_item_create = ['ctrl+n']
file_panel_item_rename = ['ctrl+r']
copy_items             = ['ctrl+c']
cut_items              = ['ctrl+x']
paste_items            = ['ctrl+v']
delete_items           = ['delete']
drag_items             = ['ctrl+d']
extract_file           = ['ctrl+e']
compress_file          = ['ctrl+a']
copy_path              = ['ctrl+p']

# ─────────────────────────────────────────────────────────────────────────────
# App / UI operations  alt+  (navigate the app itself)
# ─────────────────────────────────────────────────────────────────────────────
quit                               = ['ctrl+q']
create_new_file_panel              = ['alt+n']
close_file_panel                   = ['alt+w']
focus_on_process_bar               = ['alt+p']
focus_on_sidebar                   = ['alt+s']
focus_on_metadata                  = ['alt+m']
toggle_file_preview_panel          = ['alt+f']
toggle_detail_view                 = ['alt+d']
open_sort_options_menu             = ['alt+o']
toggle_reverse_sort                = ['alt+r']
toggle_dot_file                    = ['alt+.']
open_file_with_editor              = ['alt+e']
open_current_directory_with_editor = ['alt+E']
pinned_directory                   = ['alt+b']
toggle_footer                      = ['alt+t']
copy_present_working_directory     = ['alt+c']

# ─────────────────────────────────────────────────────────────────────────────
# Selection  (visual mode removed — selection works in any mode)
# ─────────────────────────────────────────────────────────────────────────────
# shift+up / shift+down will be hard-coded; kept here during source migration
file_panel_select_mode_items_select_up   = ['shift+up']
file_panel_select_mode_items_select_down = ['shift+down']
file_panel_select_all_items              = ['alt+a']


# ─────────────────────────────────────────────────────────────────────────────
# Pending hard-coding — still read from config; will be removed from TOML
# once source is updated to hard-code these directly
# ─────────────────────────────────────────────────────────────────────────────
confirm_typing    = ['enter']
cancel_typing     = ['esc']
open_help_menu    = ['?']
open_command_line = [':']
open_spf_prompt   = ['>']
search_bar        = ['/']
